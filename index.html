<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>COSLUNE FINDS | Premium Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
     :root {
      /* Palette BBDBUY Atténuée : Vrai noir et orange mat très doux */
      --bg-dark: #000000;                 /* VRAI NOIR pour le fond */
      --accent-color: #ff5500;            
      --accent-glow: rgba(255, 85, 0, 0.2);
      --accent-glow: rgba(217, 83, 30, 0.15); /* Halo très faible */
      --text-main: #ffffff;               /* Texte principal Blanc */
      --text-muted: #888888;             /* Texte secondaire gris moyen pour ne pas fatiguer */
      --border-color: #222222;            /* Bordures très sombres et discrètes */
      --border-hover: #d9531e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      font-family: 'Montserrat', sans-serif;
      background: #000000;                /* Vrai noir uni, l'effet flashi du haut a disparu */
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      position: sticky; top: 0; 
      background: rgba(11, 15, 25, 0.75);
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      display: flex; justify-content: space-between; 
      align-items: center; padding: 15px 25px; 
      border-bottom: 1px solid var(--border-color); z-index: 1000;
    }
    .logo { font-weight: 800; font-size: 24px; letter-spacing: 1px; }
    .logo span { color: var(--accent-color); text-shadow: 0 0 10px var(--accent-glow); }

    .banner { text-align: center; padding: 30px 15px 15px; }
    .main-title { color: #fff; font-weight: 800; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; display: block; }
    .main-title span { color: var(--accent-color); }
    .warning { color: #ff4d4d; font-size: 11px; font-weight: 700; display: block; margin-top: 8px; opacity: 0.9; letter-spacing: 0.5px; }

    .social-nav {
      display: flex; justify-content: center; gap: 15px; padding: 15px;
      flex-wrap: wrap; max-width: 650px; margin: auto;
    }
    .social-item {
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: white; font-size: 11px; font-weight: 700;
      transition: all 0.3s ease; width: 95px; text-align: center;
    }
    .social-item:hover { transform: translateY(-4px); }
    .social-item:hover span { color: var(--accent-color); text-shadow: 0 0 8px var(--accent-glow); }
    .social-item img {
      width: 55px; height: 55px; border-radius: 14px; margin-bottom: 8px;
      border: 1px solid var(--border-color); background: rgba(255,255,255,0.03);
      object-fit: contain; padding: 8px; transition: all 0.3s ease;
    }
    .social-item:hover img { border-color: var(--accent-color); box-shadow: 0 0 15px var(--accent-glow); }

    .controls {
      padding: 15px 20px; display: flex; gap: 12px; max-width: 1200px; margin: auto;
    }
    .search-input {
      flex: 2; padding: 14px 20px; border-radius: 12px; border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.04); color: white; outline: none; 
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      font-family: 'Montserrat', sans-serif; transition: all 0.3s; font-size: 14px;
    }
    .search-input:focus { border-color: var(--accent-color); box-shadow: 0 0 10px rgba(217, 83, 30, 0.2); }
     
    .sort-select {
      flex: 1; background: #141c2f; color: white; border: 1px solid var(--border-color);
      border-radius: 12px; padding: 14px; cursor: pointer; font-family: 'Montserrat', sans-serif;
      outline: none; font-size: 14px; transition: all 0.3s;
    }
    .sort-select:focus { border-color: var(--accent-color); }

    .grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 15px; padding: 20px; max-width: 1200px; margin: auto;
    }
    .card {
      background: var(--bg-card); border-radius: 16px;
      overflow: hidden; border: 1px solid var(--border-color);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; flex-direction: column; text-decoration: none; color: inherit;
    }
    .card:hover { 
      transform: translateY(-5px); 
      border-color: var(--border-hover); 
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3), 0 0 15px rgba(217, 83, 30, 0.1); 
    }
    .card-img-wrapper { width: 100%; height: 150px; overflow: hidden; background: #070a12; position: relative; }
    .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .card:hover img { transform: scale(1.06); }
     
    .card-body { 
      padding: 14px; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1;
    }
    .card-body .name { 
      font-weight: 600; font-size: 12px; line-height: 1.4; color: #fff;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 8px; height: 34px;
    }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
    .card-body .price { color: var(--accent-color); font-weight: 800; font-size: 15px; text-shadow: 0 0 10px rgba(217, 83, 30, 0.2); }
    .buy-btn { background: rgba(217, 83, 30, 0.1); color: var(--accent-color); padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(217, 83, 30, 0.2); transition: 0.2s; }
    .card:hover .buy-btn { background: var(--accent-color); color: #000; }

    /* POPUP ULTRA COMPACT & ORANGE MAT */
    #popupBBD {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
      display: none; align-items: center; justify-content: center; z-index: 9999;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .BBD-popup {
      background: #121212; color: white; width: 85%; max-width: 320px;
      padding: 15px; border-radius: 14px; text-align: center; 
      border: 1px solid var(--accent-color);
      position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.9);
    }
    .BBD-popup h2 { font-weight: 800; font-size: 16px; color: var(--accent-color); margin-top: 5px; margin-bottom: 8px; }
    .BBD-popup p { font-size: 11px; color: var(--text-muted); line-height: 1.4; margin-bottom: 15px; }
    
    .hipo-btn {
      display: block; padding: 12px; border-radius: 8px; font-weight: 800; font-size: 13px;
      text-decoration: none; background: var(--accent-color); color: #000;
      box-shadow: 0 4px 15px var(--accent-glow); transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .hipo-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px var(--accent-glow); }
    
    .BBD-close { 
      position: absolute; 
      top: 10px; 
      right: 15px; 
      background: none; 
      border: none; 
      color: var(--text-muted); 
      font-size: 22px; 
      cursor: pointer; 
      transition: 0.2s; 
      z-index: 10000;
    }
    .BBD-close:hover { color: #fff; }

    #mobileMenu {
      position: fixed; top: 75px; right: 25px; background: rgba(17, 24, 39, 0.95); 
      border: 1px solid var(--border-color); border-radius: 14px; display: none; 
      flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); overflow: hidden;
    }
    .menu-item { padding: 15px 35px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; text-align: center; }
    .menu-item:hover { background: rgba(255,255,255,0.05); color: var(--accent-color); }
    .menu-item.active { color: var(--accent-color); background: rgba(217, 83, 30, 0.05); }

    @media (min-width: 768px) { 
      .grid { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 25px; } 
      .card-img-wrapper { height: 180px; }
      .social-item { font-size: 12px; width: 120px; }
      .social-item img { width: 65px; height: 65px; }
      .main-title { font-size: 32px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">COSLUNE<span>.</span>FINDS</div>
  <div onclick="toggleMenu()" style="cursor:pointer; color:var(--accent-color); font-size:28px; padding: 5px;">&#9776;</div>
</header>

<div id="mobileMenu">
  <div class="menu-item active" id="btn-articles" onclick="switchTab('articles')">Articles</div>
  <div class="menu-item" id="btn-vendeurs" onclick="switchTab('vendeurs')">Vendeurs</div>
</div>

<div class="banner">
  <span class="main-title">Meilleure Sélection <span>2026</span> 🔥</span>
  <span class="warning">⚠️ CERTAINS LIENS PEUVENT ÊTRE SUPPRIMÉS OU EN RUPTURE</span>
</div>

<nav class="social-nav">
  <a href="https://www.tiktok.com/@bbdbuyxyou?is_from_webapp=1&sender_device=pc" target="_blank" class="social-item">
    <img src="https://i.imgur.com/w0MAvg6.png" alt="TikTok">
    <span>TikTok</span>
  </a>
  <a href="https://t.me/+c6FdBetY4TQ5Zjdk" target="_blank" class="social-item">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Telegram_2019_Logo.svg/960px-Telegram_2019_Logo.svg.png" alt="Telegram">
    <span>Telegram</span>
  </a>
  <a href="https://discord.gg/xN6eeesfD" target="_blank" class="social-item">
    <img src="https://i.imgur.com/aj1aMEQ.png" alt="Discord">
    <span>Discord FR</span>
  </a>
  <a href="https://www.bbdbuyeu.com/register?inviteCode=hQUDCD" target="_blank" class="social-item">
    <img src="https://th.bing.com/th/id/OIP.-ykdS5LGPrH4ftZI26C9iAHaHa?w=166&h=180&c=7&r=0&o=7&pid=1.7&rm=3" alt="BBDBUY">
    <span>BBDBUY</span>
  </a>
</nav>

<div class="controls">
  <input type="text" id="searchInput" class="search-input" placeholder="Rechercher un article..." onkeyup="renderAll()">
  <select id="sortOption" class="sort-select" onchange="renderAll()">
    <option value="recent">Plus récent</option>
    <option value="old">Plus ancien</option>
    <option value="low">Prix croissant</option>
    <option value="high">Prix décroissant</option>
  </select>
</div>

<div id="articles" class="tab-content"><div class="grid" id="articleGrid"></div></div>
<div id="vendeurs" class="tab-content" style="display:none;"><div class="grid" id="vendeurGrid"></div></div>

<!-- FENÊTRE POPUP RECADRÉE ET NETTOYÉE -->
<div id="popupBBD">
  <div class="BBD-popup">
    <button class="BBD-close" onclick="closePopup()">✕</button>
    <h2>REJOINS BBDBUY !</h2>
    <p>Inscris-toi dès maintenant sur BbdBuy pour obtenir ton pack de coupons exclusifs.</p>
    <a href="https://www.bbdbuyeu.com/register?inviteCode=hQUDCD" target="_blank" class="hipo-btn">S'INSCRIRE ICI</a>
    <label style="display:block; margin-top:15px; font-size:11px; color:var(--text-muted); cursor:pointer;">
      <input type="checkbox" id="noMore" style="margin-right: 6px;"> Ne plus afficher
    </label>
  </div>
</div>

<script>
  let currentTab = 'articles';
  let articles = [];
  let vendeurs = [];

  function addArticle(name, price, image, link){
    articles.push({name, price: parseFloat(price), image, link, id: articles.length});
  }
  function addVendeur(n,i,l){ 
    vendeurs.push({name:n, image:i, link:l, id: vendeurs.length}); 
  }

  // --- BASE DE DONNÉES ARTICLES ---
  addArticle("Pull Nike Tech",19.00,"https://bbd-hy.oss-cn-heyuan.aliyuncs.com/INBOUND/SERVICE/BASIC/2026/04/25/515DD3C2840049039EB4E1B2FC7A85D8.jpg","https://www.bbdbuyeu.com/goods/WEIDIAN/7760533989");
  // --- FONCTIONS LOGIQUES APPRÉCIÉES DU SITE ---
  window.onload = function() {
    renderAll();
    // Affiche le pop-up après 1 seconde automatiquement
    if (!localStorage.getItem('hideBBD')) {
      setTimeout(() => {
        document.getElementById('popupBBD').style.display = 'flex';
      }, 1000);
    }
  };

  function toggleMenu() {
    let menu = document.getElementById('mobileMenu');
    menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('articles').style.display = (tab === 'articles') ? 'block' : 'none';
    document.getElementById('vendeurs').style.display = (tab === 'vendeurs') ? 'block' : 'none';
    
    document.getElementById('btn-articles').classList.toggle('active', tab === 'articles');
    document.getElementById('btn-vendeurs').classList.toggle('active', tab === 'vendeurs');
    if(document.getElementById('mobileMenu').style.display === 'flex') toggleMenu();
    renderAll();
  }

  function closePopup() {
    if (document.getElementById('noMore').checked) {
      localStorage.setItem('hideBBD', 'true');
    }
    document.getElementById('popupBBD').style.display = 'none';
  }

  function renderAll() {
    let query = document.getElementById('searchInput').value.toLowerCase();
    let sort = document.getElementById('sortOption').value;

    if (currentTab === 'articles') {
      let filtered = articles.filter(a => a.name.toLowerCase().includes(query));
      
      if (sort === 'recent') filtered.sort((a,b) => b.id - a.id);
      if (sort === 'old') filtered.sort((a,b) => a.id - b.id);
      if (sort === 'low') filtered.sort((a,b) => a.price - b.price);
      if (sort === 'high') filtered.sort((a,b) => b.price - a.price);

      let html = '';
      filtered.forEach(a => {
        html += `
          <a href="${a.link}" target="_blank" class="card">
            <div class="card-img-wrapper"><img src="${a.image}" alt="${a.name}"></div>
            <div class="card-body">
              <div class="name">${a.name}</div>
              <div class="card-footer">
                <span class="price">${a.price.toFixed(2)} €</span>
                <span class="buy-btn">Acheter</span>
              </div>
            </div>
          </a>`;
      });
      document.getElementById('articleGrid').innerHTML = html;
    } else {
      let filtered = vendeurs.filter(v => v.name.toLowerCase().includes(query));
      let html = '';
      filtered.forEach(v => {
        html += `
          <a href="${v.link}" target="_blank" class="card">
            <div class="card-img-wrapper"><img src="${v.image}" alt="${v.name}"></div>
            <div class="card-body">
              <div class="name">${v.name}</div>
              <div class="card-footer">
                <span class="buy-btn" style="width:100%; text-align:center;">Voir la boutique</span>
              </div>
            </div>
          </a>`;
      });
      document.getElementById('vendeurGrid').innerHTML = html;
    }
  }
</script>
</body>
</html>
