<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADZM Finds</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0b0b0f;
      color:white;
      font-family:Arial,sans-serif;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(0,0,0,0.8);
      backdrop-filter:blur(20px);
      padding:20px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    header h1{
      font-size:28px;
      letter-spacing:2px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
      padding:25px;
      max-width:1400px;
      margin:auto;
    }

    .card{
      background:#111318;
      border-radius:25px;
      overflow:hidden;
      transition:0.25s ease;
      cursor:pointer;
      border:1px solid rgba(255,255,255,0.06);
    }

    .card:hover{
      transform:translateY(-8px);
      border-color:#00d1ff;
    }

    .card img{
      width:100%;
      height:320px;
      object-fit:cover;
      display:block;
    }

    .card-body{
      padding:18px;
    }

    .card-body h2{
      font-size:18px;
      margin-bottom:10px;
    }

    .price{
      color:#00d1ff;
      font-size:20px;
      font-weight:bold;
    }

    .button{
      margin-top:15px;
      display:inline-block;
      padding:10px 18px;
      background:#00d1ff;
      color:black;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      transition:0.2s;
    }

    .button:hover{
      transform:scale(1.05);
    }

    @media(max-width:768px){

      .grid{
        grid-template-columns:1fr;
        padding:15px;
      }

      .card img{
        height:260px;
      }

      header h1{
        font-size:22px;
      }

    }

  </style>

</head>
<body>

<header>
  <h1>ADZM FINDS</h1>
</header>

<div class="grid">

  <div class="card">

```
<img src="https://i.imgur.com/glqnO1W.jpeg">

<div class="card-body">

  <h2>Pull Nike Tech</h2>

  <div class="price">20€</div>

  <a class="button" href="https://google.com" target="_blank">
    Voir
  </a>

</div>
```

  </div>

  <div class="card">

```
<img src="https://i.imgur.com/vUvVsy1.jpeg">

<div class="card-body">

  <h2>Nike Running</h2>

  <div class="price">15€</div>

  <a class="button" href="https://google.com" target="_blank">
    Voir
  </a>

</div>
```

  </div>

</div>

</body>
</html>
