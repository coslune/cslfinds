  // --- LOGIQUE INTERACTIVE (RECHERCHE, TRI, TABS) ---
  function toggleMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('articles').style.display = (tab === 'articles') ? 'block' : 'none';
    document.getElementById('vendeurs').style.display = (tab === 'vendeurs') ? 'block' : 'none';
    
    document.getElementById('btn-articles').classList.toggle('active', tab === 'articles');
    document.getElementById('btn-vendeurs').classList.toggle('active', tab === 'vendeurs');
    
    document.getElementById('mobileMenu').style.display = 'none';
    renderAll();
  }

  function renderAll() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sort = document.getElementById('sortOption').value;

    if (currentTab === 'articles') {
      let filtered = articles.filter(a => a.name.toLowerCase().includes(search));
      
      if (sort === 'recent') filtered.sort((a, b) => b.id - a.id);
      if (sort === 'old') filtered.sort((a, b) => a.id - b.id);
      if (sort === 'low') filtered.sort((a, b) => a.price - b.price);
      if (sort === 'high') filtered.sort((a, b) => b.price - a.price);

      let html = '';
      filtered.forEach(a => {
        html += `
          <a class="card" href="${a.link}" target="_blank">
            <div class="card-img-wrapper">
              <img src="${a.image}" alt="${a.name}" loading="lazy">
            </div>
            <div class="card-body">
              <span class="name">${a.name}</span>
              <div class="card-footer">
                <span class="price">${a.price.toFixed(2)} €</span>
                <span class="buy-btn">Lien</span>
              </div>
            </div>
          </a>`;
      });
      document.getElementById('articleGrid').innerHTML = html || '<p style="grid-column:1/-1; text-align:center; color:var(--text-muted);">Aucun article trouvé.</p>';
    } else {
      let filtered = vendeurs.filter(v => v.name.toLowerCase().includes(search));
      let html = '';
      filtered.forEach(v => {
        html += `
          <a class="card" href="${v.link}" target="_blank">
            <div class="card-img-wrapper">
              <img src="${v.image}" alt="${v.name}" loading="lazy">
            </div>
            <div class="card-body">
              <span class="name">${v.name}</span>
              <div class="card-footer">
                <span class="price">Shop</span>
                <span class="buy-btn">Visiter</span>
              </div>
            </div>
          </a>`;
      });
      document.getElementById('vendeurGrid').innerHTML = html || '<p style="grid-column:1/-1; text-align:center; color:var(--text-muted);">Aucun vendeur trouvé.</p>';
    }
  }

  // --- POPUP HIPOBUY CONTROLS ---
  function closePopup() {
    if (document.getElementById('noMore').checked) {
      localStorage.setItem('hideHipoPopup', 'true');
    }
    document.getElementById('popupHipo').style.display = 'none';
  }

  // Lancement automatique au chargement de la page
  window.onload = function() {
    renderAll();
    // Force l'affichage du pop-up après 1 seconde, même si on a coché la case
    setTimeout(() => {
      document.getElementById('popupHipo').style.display = 'flex';
    }, 1000);
